name: comon_orm_sqlite_flutter
description: Flutter-oriented SQLite runtime adapter for comon_orm built on the sqflite ecosystem.
version: 0.0.1-alpha.1
homepage: https://github.com/serezhia/comon_orm
repository: https://github.com/serezhia/comon_orm
issue_tracker: https://github.com/serezhia/comon_orm/issues
documentation: https://github.com/serezhia/comon_orm/blob/main/packages/comon_orm_sqlite_flutter/README.md
topics:
  - orm
  - prisma
  - sqlite
  - flutter
  - sqflite

environment:
  sdk: ^3.9.0
  flutter: '>=3.35.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  comon_orm: ^0.0.1-alpha.1
  sqflite: ^2.4.2
  sqflite_common: ^2.5.6
  sqflite_common_ffi: ^2.4.0+2
  sqflite_common_ffi_web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.1.1
